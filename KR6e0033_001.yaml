body:
  text: 西晉月支三藏竺法護譯初發意悅豫住品第一聞如是一時佛遊第六他化自在天上天王宮如意藏珠妙寶殿上與大菩薩衆不可計俱各從他方諸佛國來普集會此金剛藏菩薩等爾時金剛藏菩薩承佛威神以大慧光三昧正受適定意已應時十方諸佛剎土一一諸方如十億佛剎滿中諸塵若干億國諸如來現邊有菩薩其號各各曰金剛藏十方亦然皆同一號時此諸佛俱讚曰善哉善哉汝乃以此大慧光菩薩三昧而以正受在十方佛土各如十億滿中諸塵諸如來等之所建立一切等號悉是照明如來至真本願所致而建立此亦是仁者慧淨所致復是一切諸菩薩等不可思議法光聖旨住明智地多所度脫攝取一切衆德之本皆曉諸佛本所行成愍念十方解了善權敷演道化普弘法慧周流十方所講經誼盡令堅住其智慧明無能毀者隨時建立僉使得安遊諸世間不著方俗度世清淨莊嚴善本入不可議慧之境界通一切智高遠聖道乃能招致諸菩薩等十住行無如開士衆所當建立有所宣布往返周旋執無漏法光明咸照而善思惟撰於離心曉了隨時大慧光明其未善度至聖道門使得度脫而無所著住於內行專精奉修無上大乘其辨才慧不可稱載威曜普照消除暗冥已超衆行班宣無極住在佛地逮菩薩意愍念衆生未曾忘捨遊入一切諸佛至真善權方便決衆結網承佛聖旨自恣講說演此法門靡不解了如來在世故為建立亦是卿本善願所致清淨行業而諦莊嚴一切法界又救衆生之所惑亂以致法身至聖慧體具足諸佛本所志願其身所行皆越世俗普過世間無益之業嚴飾清淨度世之法諸佛世尊為金剛藏菩薩大士無所吝惜各現己身宣布無限辨才之義分別決解甚清淨慧懷抱不忘建立顯示隨時便宜暢衆疑心普入一切諸佛所念諸等正覺十力所由如來所致四無所畏而不怯弱宣布至教一切智業諸分別辨超越得入體解道法入諸如來身口心行所以者何皆由此定成就所致亦由本願行通巍巍其心清淨而無沾污內性明了常懷清淨威耀弘照入于慧場諸所行業靡不備焉斯所造立而悉具足其道器意不可限量信志清淨巍巍普達逮總持門無所破壞常以法界慧門之印善印一切是諸佛世尊各自顯現各申右臂皆共手摩金剛藏菩薩頭首時金剛藏為諸世尊所見摩頭道德巍巍遂得成就威耀光光如佛無異爾時尋即從三昧起請諸菩薩而解言曰諸最勝子吾已明達諸菩薩願破壞疑網則無所壞世無所生亦無罪釁法界弘廣亦無遠近其所遊居譬如虛空以是救濟擁護十方一切衆生所以然者族姓子知過去菩薩往古諸佛由此慧地而得過度當來現在亦復如是諸佛子知我向者云菩薩之地為何謂也諸菩薩學有十道地因得成就無上正覺去來今佛之所講說初菩薩住名曰悅豫第二菩薩住名曰離垢第三菩薩住名曰興光第四菩薩住名曰暉曜第五菩薩住名曰難勝第六菩薩住名曰目見第七菩薩住名曰玄妙第八菩薩住名曰不動第九菩薩住名曰善哉意第十菩薩住名曰法雨是諸菩薩十住道地也我觀十方去來今佛諸如來至真無不講此十住之業所以者何諸佛子等是十住者令諸菩薩現在親近清淨道無為諸法門名顯遠照于十方無數佛土三界衆生咸蒙得濟照天下如日明療衆病如醫王度衆人如船師曜十方如月盛活一切猶如地安衆生如時雨含道法如虛空正堅住如須彌宣布此教則得堅立在十道地又解此地不可思議諸菩薩住僉入聖慧時金剛藏菩薩粗舉其要歎此菩薩十住地業尋即默然不復重解於是大衆咸懷飢虛聞此菩薩十住道名欲令分別重敷演義聞者僉解心懷入道離諸顛倒各心念言金剛藏菩薩今何以故粗舉其要宣於十住菩薩之業稱歎其號而更默然不復重散解了本末時彼會中有一菩薩名月解脫亦來俱會時月解脫菩薩大士知彼衆會開士所念以偈歎頌問金剛藏此義所歸淨念以何故懷慧稱功勳明智宣十住不重解所入諸菩薩勇猛心各抱猶豫云何說義名不聞道地處咸欲悉共聞最勝子無畏決義入平等所行住道地衆會僉悅豫清淨除諛諂堅住解明地功勳慧平均一切立恭敬展轉相承望求微妙無瑕志無上甘露因聞金剛藏無畏大智慧常歡悅來衆仁宜與佛談未曾最難及顯菩薩所行分別如道地所由最上勝棄想微難見常住遠離心柔仁行成慧面聞所歸趣所止如金剛第一解佛慧立心捨吾我乃聞此上智如來盡虛無離欲亦如空慧如地無漏興別最難見道無念如此信者甚難值佛慧不可議故默不重說月解脫菩薩謂金剛藏佛子當察諸來會者性行淳淑清淨離穢其志仁和悉諸菩薩斯行真正積功纍德每生自克六度無極以自莊嚴四等四恩習權方便功勳遠著名德無量大慈大哀欲興道化分流法教救濟三界諸危厄衆消衆冥如日明生道品如良田成正覺如虛空長弘教如流水除狐疑如日光療三毒如醫王度生死譬船師是故佛子仁者善哉宜當班宣現在學行令此道地緣修所歸使諸會者各得開解如冥覩明應病授藥使無餘疑時月解脫菩薩大士欲令此義重散本末顯示歸趣為金剛藏說此頌曰茂盛願講說殊特最上法人中上所行諸菩薩之業敷演說其教所住之道地聖慧甚清淨巍巍仁和業諸會者清淨不可計第一堅住在正路志性懷篤信善纍功積德奉無數億佛各欲得決解尋現逮十住金剛藏菩薩報月解脫佛子察之今此衆會四面雲集云何見之所念應宜柔弱仁和清淨無瑕豈離狐疑無猶豫乎於斯法要寧有高行不依他人無戴仰耶不從他教進退不安懷抱久病不可療治堅住羅網未出深塹六十二疑四倒五蓋火林蛇室十二牽連十重之閣三坑三戶三流之逸遊在曠野未向佛門設聞此法躊躇不進或復有人若聞於此不可思議如是道住各懷異心聞之狐疑不肯篤信由此惑亂長夜不安永失利義捨根取枝吾故向者默然不言慈愍此等無辭為住樂無所樂又說偈言豈見於衆會智慧淨無垢善敷演聖道諸根通深妙而無所戴仰無動等如山志性無瞋恨思平如水正習修何所行其慧無等倫住在樂所識為求義慧信適聞恐猶豫便墮于惡趣以故愍念此不說慧住地月解脫菩薩復謂金剛藏仁者顧意承佛威神宣如來旨感動十方反僞向真消諸垢塵蕩滌結滯裂三界網通無極慧唯敷演之如是比像不可思議善當將養寬弘之士必當信樂無猶豫者所以者何佛子當知若講此教將致道法一切菩薩皆念諸佛識達經義擁護奉此行慧道地靡不蒙賴咸得安隱所以者何斯之所行必歸平等諸佛道法猶如佛子一切書疏唯說文字此悉由意心為源首從志因緣而有所倚書本無文所演文字心之源空宣之虛無如是佛子一切佛法住為源首因行而成依於道地至自然慧是故唯說顧愍一切如來至真等正覺道力助卿建立分別如此文字令其坦然將護正法因得久存使無餘結又說偈言善哉演清淨解入一切智普遊諸道要至覺成聖慧諸在十方佛安住最道勝慧室至境界皆共愍念之立此親近慧行是究竟迹諸佛無比法悉由無量業猶書意合集因心事為首此住意如是解暢至佛道於是一切菩薩各各發心咸共勸助欲令宣揚仁本興意誓為一切勤勞積功纍無量德猶如虛空欲濟危厄不難劫數周遊生死心常慺慺欲濟一切心無所著行如蓮華在泥塗中三界之苦不以為拘唯懷愍傷拔惱根株三世之樹永令無餘時諸菩薩同時舉聲勸歎金剛藏菩薩而說頌曰最勝殊特志覺遠辨才無量心念具宣傳柔軟至佛教第一至真甚微妙其意堅固行清淨不捨功勳十種力以分別辨故造行唯願當演上道法心之所念如明珠意寂以見消塵欲今此衆會離狐疑咸皆願樂仁所說虛渴言教如望泉飢服仁者病待醫甘美之餅在目前如是欣樂甘露味故善垂念廣其志宣殊勝住除垢塵調寂正安不捨無講衆祐行無患難於是世尊有諸菩薩至聖光明號曰力勢佛從眉間演此光耀興無數明普照十方一切佛土消滅一切諸所惡趣勤苦休息不復考治皆安隱照斯如來一切道場十方佛國建立法講靡不周悉不可思議諸佛境界其光則還繞佛三匝上住虛空合成大光光明煒煒立交露帳又有諸佛興出世間自然威曜從其眉間演如是倫諸菩薩等力勢光明現如此比神足變化照斯忍界曜是能仁衆會道場及金剛藏師子之座乃住虛空成光交露帳是能仁佛眉間毫跱光明廣遠照諸暗冥十方佛界衆會道場莫不蒙明光咸顯現在諸菩薩大士屋宇一切晃現其於十方諸佛國土現諸如來所可演出眉間光耀皆復照耀此忍世界能仁衆會菩薩道場周照師子高廣之座在金剛藏菩薩身現於大光巍巍晃然珠交露帳各有坐佛自從口出如是輩聲而歎頌曰喻之無等倫譬之如虛空十力境界尊功勳不可量殊勝最上特普世為無上建立第一業釋師子之法講衆安住子蒙導師恩慈法王人中帝演眉間光明班宣佛道慧入妙衆行無賴十力垂顧分別普化衆安住已建立斯聞能宣照寶法為上尊是寂其志性一切住無穢具足滿本願因十力最勝志求上尊路海水尚可盡一切數知限若人欲度此不可卒得聞其能離志念永除衆狐疑一切未有愍照以此經典是故辨才尊緣住慧徑路所處奉斯行遊步依本業至行入境界普到佛聖智愍一切衆生布散此法因於是金剛藏菩薩觀于十方欲令衆會重懷悅豫渴仰於法興發大哀無極之慈應時因是嗟歎此頌大聖之道法微妙甚深遠無念以捨念清澄永難了聖明達玄微智慧解所行自然業寂安柔仁無諍亂自然空淨法寂寞除苦患遊居至解脫逮平等滅度無限無極義言辭近超度以越于三世行等猶虛空諸衆祐所行寂然甚淡泊一切之行業徑路難逮解此等行如地志性亦若斯甚難可講說何能分別了以去棄心意永無心句迹諸衆祐所行智慧消言食亦復無所行無陰衆衰入聖達依慧業其心無想念猶如有飛鳥遊行在虛空不可以言辭何況欲覩見安住自然慧如是行道住其心所行念不可分別知何所有入處殊勝慧土地愍傷常慈哀志願普備悉漸以具衆行心亦無想念猶如心本性智慧以明了如斯行之業微妙甚難解自己志性無不可卒達知何況能宣布安住之所念一切共恭敬明聽玄妙教以入正真慧如行道之住若於億千劫不可盡究竟等俱咸悅豫普共且專聽至誠妙真義無厭亦無異不以為憒亂猶如成大海今當具敷演諸衆祐道行又當班宣說殊特之法音牽引衆譬喻正真等文字其所講分別甚難可解散安住行業事如是不可量今已得逮入吾我之自然咸樂如一渧且聽所宣言爾時金剛藏菩薩大士謂衆會者佛子且察諸集衆生積纍德本所行真諦而無虛僞所造行業甚善將護諸佛興世常勤供養極以合會諸清白法恆以咨受善知識俱以除憂戚志性寬弘篤信微妙定意平等面覩現在愍念慈哀心常志慕諸佛聖慧化諸衆生悉發道心皆令至真好一切智其十種力強而有勢則得遊行大無所畏其意坦然得佛正法擁護救濟一切衆生修大愍傷其哀清淨十方無餘悉解一切明智至門悉現目前一切佛土無為清淨一時覺了三世世事轉大法輪療衆疾病菩薩大士須臾發意愍衆生行無極大哀以為元首智慧明了甚為巍巍常勤學受善權方便意性和柔親近道法如來十力不可限量善思選擇計一切人力佛力最上所宣法門無所罣礙而以和順自在之慧佛悉了知一切佛興因是自在造立道法法界行最立虛空際所可發心顯了當來發菩薩意適發道意超凡夫地以得超越菩薩之地則得生在如來種姓因號之曰無所從生無有罪釁輒以回轉世俗所趣適過世俗由度世行因得住立菩薩道法已得住立菩薩道法便能順從三世佛教勤心道義常深第一菩薩住如是道法悅豫道地佛子當知如斯得立住菩薩道所行不動入不回還以住菩薩悅豫地者因是發意多所悅豫其有見者莫不歡然常有恭敬以致利養其來見者咸共欣喜開化衆人僉然受教普來雲集共相娛樂雖致遠近計無堅固常抱仁和無所傷害恆志悅豫心不懷恨和顏悅色而無瞋恨是為菩薩悅豫之地住于道教諸佛世尊皆共念之第一悅豫思於佛法適發悅豫念於菩薩大士本業適懷悅豫念菩薩行適發悅豫念於六度清淨無極適發悅豫念於開士所住殊特適發悅豫思道最微而無等侶適發悅豫用衆生故利益道義適發悅豫進心深法適發悅豫念於如來至真之教念以勸化一切衆生適發悅豫念諸菩薩入如來慧精進之業重復思惟將導不逮為以得度說諸衆生所慕境界懷來進入諸佛平等已得遠出愚癡之地親近道場斷除一切惡趣勤苦為諸衆生勸導之首已得覩見如來至真具足成就如來境界皆已逮覩諸菩薩定平等之業故悅豫耳永以消除一切恐懼衣毛不竪故悅豫耳所以者何是故佛子諸菩薩學以是悅豫便逮得立菩薩道地以得住立菩薩道地諸所恐畏永無復難在無命安無世俗畏無死之畏不畏惡趣所入衆會無所忌難皆以永除一切諸懼所以者何無吾我想不貪己身況復貪愛一切榮異所生業乎不畏無壽亦不思念悕望僥幸唯愍群生一切所有無極之業救諸窮乏貪不識道是無俗畏成其道明不自見身不畏失己無吾我想不畏當死雖身壽終成菩薩行不離諸佛由是之故不畏惡趣普觀世間察於道心而無等倫志性仁和誰能踰者以是之故所入衆會不懷忌難離於恐懅衣毛不竪佛子當解菩薩大士以具大哀不抱傷害修本淨心益加精進合集一切衆德之本佛言以篤信至威神漸備多所歡悅淨諸不信篤信以興常行愍哀歸無極慈心不患厭生死之難志于慚愧而自莊嚴心所生處忍辱仁和若干種物供養奉上如來至真最等正覺夙興夜寐精進勤修不厭講誦積功德本習於善友以法樂而自娛求博聞不懈惓若聞法順思惟已思惟無所著不悕望衣食業諸利養心不貪慕萬物恩愛心永已除唯慕義求三寶發意之頃不廢正行勤修慕樂一切智地如來十力四無所畏佛十八法專精奉行六度無極棄捐虛僞而無諛諂言行相應不違心口所至到處常順言行未曾毀亂如來種姓恆一心念菩薩禁戒一切智心不可動搖猶如太山不可傾覆普於世間無所慕樂求度世業以化未聞學於道品不知厭足心常勤勤求殊特事是為佛子如是像業清淨道事淨菩薩法輒得堅住悅豫之地世尊復言若能得立悅豫地者成菩薩住建立廣大無極之道如是景模無限大願弘誓之鎧又有十事法何謂為十班宣無盡和雅音辭至於無喻無不周悉供養諸佛一切奇珍篤信微妙清淨之業法界坦然志歸空界究暢解達於當來際一切無想無所悕望令佛道興無所思樂所奉事者供於無極志務大願念諸如來所開演教執持法目將護諸佛諸菩薩業不違一切平等覺訓已能具足如上法訓輒得出生在兜術天上從天來下入母腹中處在胎藏從母腹出隨行七步舉手自讚三界最尊釋梵稽首諸龍浴體學書手博遊觀所覩出家入山成佛降魔釋梵勸助轉大法輪現大滅度供養舍利宣布道化顯衆經義皆以一時至不退轉法界弘廣不可限量處虛空界究竟解暢當來之際於一切念而無想念從無數劫會成佛道篤信無惓俱往合同班宣義音無極弘誓乃至菩薩一切諸行弘普無窮無量無數攝取一切諸度無極住清淨道校計衆會品類音響有相無相合會別離有為無為為諸菩薩一切師首道住真妙所演章句諸度無極所當宣行勤修正行而無所生近成發心以能具足此諸法已具足解暢衆生境界色無色想無想有想無想水生陸地合會聚處一切所生三界受形六品所趣此皆受形而有處所受無像形一切無喻衆生之界悉分別之化入佛法斷除一切有為所生則得建立成一切智是則名曰法界弘廣而得處在虛空之界心能解暢當來原際一切諸想有為之業篤信無惓演御音響乃至無極弘誓之業一切解此衆生境界道俗悉達無所不通普諸佛界廣狹麁微大小所現有量無量眇眇難名曠遠原頂入于平等已入平等曉了諸根一切羅網解如門閫入諸十方以慧遍觀解暢法界虛空原際則得了入無極弘誓又一切國以為一國又以一國為一切國而平等御清淨無穢其光普照無量佛國莊嚴諸國永無塵埃分別清淨章句所歸聖慧道堂不可限量具衆生願顯示諸佛微妙境界隨其黎庶本行所興而為現化法界弘廣察空虛界永無邊幅究竟本際一切想念計校合會無有休息亦不信隨邪行之業修于清淨建弘誓鎧以化未聞使諸菩薩入寂和性當行至誠積功纍德以一緣進勸化誘導一切菩薩未曾違捨菩薩之業恣其意解顯現佛興自發己心思如來教無復往返逮致神通普遊諸國其大聖慧不可思議行菩薩業法界弘廣虛空之界而無邊際遊當來際達諸想數佛與衆數其行之數莫能損毀入於聖智顯發言行無極弘誓行菩薩道心得逮轉不退法輪其身口意未曾虛妄適得見佛聞經法教班宣聖衆演明智業適發悅豫消除塵勞致真志性猶大醫王療衆生病皆修一切諸菩薩行以故名曰法界弘廣其虛空界而無崖際暢當來際皆知一切無央數劫衆生行迹善惡所趣在於十方諸佛國土逮成無上正真之道為最正覺入於一切體中毛孔盡遍衆毛在所生處坐佛樹下轉於法輪現大滅度修大境界宣佛慧業在衆生界從其本行興佛現形頻數開化滅衆穢行一成佛道普通法界謙下恭順靡不周悉一發音響皆悅一切衆生心性現大滅度不毀十力以大明地顯示宣布一切法藏神足法慧六通之業周遊十方諸佛境界以故名曰法界弘廣其虛空界而無崖際暢當來際無央數劫當成佛道致大神通弘誓之鎧是為佛子菩薩十願以得親近具足十願令無央數不可稱載諸菩薩衆心懷悅豫住菩薩地隨時開化佛言是菩薩學以成此願復有十事所可班宣不可究竟何謂為十衆生境界不可究竟諸佛境界亦不可盡其虛空界亦不可量思法境界亦不可暢無為境界亦不可限佛之境界不可得底如來境界亦無崖際其心因緣亦不可限慧行本末不可得崖諸佛境界所可進退法回慧轉不可究竟是為十事衆生境界不可究竟成大弘誓是十事業一切皆悉不可究竟諸界虛空法界無為佛與如來其心慧行世界法轉慧進致成是大弘誓亦盡無盡衆生之界亦不可盡以不可盡此衆德本如是究竟成其道慧以是叵盡衆德之本成無損耗弘誓之鎧其心微妙而懷仁和常抱至誠篤信質朴以此信樂如來大化入平等覺本所誓願而復信樂諸度無極信入道地殊特之業信十種力開化十方信無所畏四事不護而具足是獨步三界信諸佛法十八不共超絶之義而無等侶信諸佛法不可思議信如來界不可得底宣傳聖教而不可盡信入如來無量道業信諸菩薩其行平等而無偏讜住於如來班宣道教彼念如是如來道法甚深微妙巍巍如斯寂寞無限淡泊無量空淨無際如此無相為滅無著為極寬弘如是無極所入無邊如此難當況復佛法誰能限哉是諸凡夫所見顛倒邪不能正唯念愚冥求無益事心懷意憶遊於塵勞求恩愛網協於諛諂心行虛僞慳嫉貪妬志慕生死周遊往來而抱三毒淫怒癡垢輪轉無際興于恚害心歘歘然熾在顛倒業造行罪患所有恩愛無明諸漏常思在心縛其意識展轉三界苦惱之厄篡逆之行往返無休與名色俱由相生以是名色增長所生便有六入諸衰聚宅以生六入轉相合流成于更習則興痛癢倍復貪樂於痛癢業因即業成長養因愛適成恩愛因從致生以致此生便老病死憂惱啼哭心抱惱熱合成大患計於衆生由是之故生苦陰惱身若離吾我心自計察又此我身由以愚冥譬若草木瓦石牆壁猶若形影曉了無名以是之故解脫名色五陰之身永消諸見六十二疑因斯得成無極大哀吾等當護救濟此行志在永平固安道地便致大慈弘坦聖慧菩薩以能如是慈愍是故佛子致成仁和真正順從初發意業心棄一切萬物利養汲汲吝惜修廣大業其意內懷所有珍寶帑藏金銀琉璃水精諸明月珠車𤦲馬瑙珊瑚虎珀妙玉瓔珞㻉瑤奇異象馬車乘奴客婢使眷屬徒使普能布施無所愛惜能惠郡國縣邑丘聚村落園觀池水果實妻子男女己所重愛頭目肌肉髓腦支體以能不吝一切所有則好布施供衆貧乏入佛聖明無極大道是為名曰得立初發第一道地成廣大施志性如是行於愍哀施慈布仁救濟衆生加護見在度世之業慕求利義將順群萌未曾興發患厭之心心不懈惓勤學衆典微妙經籍普達諸經曉了一切諸所造業進退由己衆義法藏覩諸衆庶隨上中下而順其意各得所從隨其本器應大小故故解世事以解世事便行時宜因護彼我被慚愧服戒德自熏忍辱心和精進無過一心智慧所行精進為己為衆慚愧行成以是修行便復出家心不回動無能傾者其力堅強緣是堅強供養如來奉受其教由是之故修治道地令其嚴淨興顯正法乃至篤信慈愍施衆悉具此已乃住菩薩悅豫之地為無數佛所見照念於無量億百千姟無限兆載諸佛所護便得進現所願有力微以逮見如來至真等正覺以仁和心而奉事之積纍菩薩永安之業諸有群生所在危厄往將護之以是德本勸助使發無上正真之道供養諸佛開化衆生使得成就欲化衆生布施飲食先救飢渴發于四恩悅樂有力奉上敬中愍順其下惠施仁愛利人等利一切罪除無有餘殃不復種禍所可供佛開化衆生以成究竟住此道地以是德本助一切智諸通愍慧轉更茂盛猶如佛子紫磨真金絶工金師燒治煉金以著火中其色益發菩薩如是供養諸佛勤化衆生功祚轉茂嚴淨此法住於道地以是德本興顯本元乃至元本進退自由金剛藏曰唯聽佛子菩薩以住初發之地當作是求觀其行迹問其本末諸佛菩薩為護善友正行無厭以成道品當所施住是故名曰第一地住以當次問第二住地所行之業云何致之諸佛菩薩明師賢友行法無厭以成道住取要言之如是第二第三第四第五第六第七第八第九第十問其本末所當施行而得成就諸佛菩薩明師賢友行法無厭成就道地道地之品所觀道業奉行德本道地處所曉了方便一一分別道地清淨所入殊特聖慧曰進各各逮致使不退轉彼以如是淨菩薩住解別如來無量聖慧以立若斯方便隨時是為菩薩第一道地而不回轉也未曾廢退如是遂進得成十住不還墮落聲聞緣覺慧住顯明稍近佛智無極光明猶如佛子明智導師將護大賈諸品群衆度厄難路得願到國入大城中所越徑路悉曉了之徑路好醜善惡難易某處殊安某處恐難重問餘路所當興立所乘車馬諸象大乘可得通度而不動傾第一住地亦復如斯猶如斯人至大城裏悉別安處無諸動轉從第一住所立道地奉慧如是靡所不達以大財富無窮之業等化大衆至入大城不為穢濁之所見溺能自為己不危衆賈如是佛子菩薩猶如明智導師以能得住第一道地曉了諸地嚴淨修治一切道地至於十住解暢菩薩一切道地入如來慧攝取菩薩無極福慶積德之業纍于聖慧所作已辦為衆大導應意開化使越生死往返大難無窮曠野飢渴苦患則以通達入一切智無極法城是故佛子菩薩大士以無惓心常修精進致於殊特嚴淨道地是為佛子名曰菩薩大士悅豫第一住地入于道門演普等教菩薩住此所遊天下國土處所得大威豪將護道法以大惠施濟于衆生以善功德消除貪嫉退其垢穢宣無窮施所興德本施救衆乏諸可珍愛割情濟衆行四恩義惠施仁愛利人等利一切救濟合聚黎庶心不捨佛思法聖衆惟菩薩業志菩薩行諸度無極十住之地念於十力四無所畏十八不共諸佛之法至悉具足一切智矣以是德致一切至尊無極豪相為最為上為無疇匹為無等侶開導宣化顯示衆人成一切智將濟危厄發意之頃精進勤修一切順化不慕時俗財利之業道法之正出家學道奉佛法教斯須之間致無央數諸三昧定見諸佛尊不可稱載以是建立覩諸世界無央數千念得越度無數國土照諸境界開化衆生識念過去當來諸劫撰擇法門顯示諸身現諸菩薩無央數載眷屬圍繞菩薩由是所建立力入殊特願在所變現諸可興善宣布惠施乃至普通無數億姟百千劫事於是金剛藏菩薩大士思惟察是菩薩住義之所歸矣即時頌曰積纍清白法殖衆德之本稽首歸諸佛順行慈仁業入于信解脫清淨善之元心御無限量最勝之聖慧佛為一切智淨力現其處成就衆祐法導利護群黎以行大愍哀轉殊勝法輪如來田佳良興發心甚尊一時所曉了思惟泥洹業若干覺衆生隨時顯其義合集一切德是為衆導師其心所周入猶等如虛空智慧最威神本哀行善權志性懷篤信清淨力無量面見無罣礙救濟外衆生殖種平等業思惟念安住適生心之寶衆祐自然慧以通雅力行究竟佛道法生十力種性永無諸罪殃最勝曜正真至于尊上道是為心和同顯發致平地無動猶如山在國等性行多所抱歡悅志意修篤信欣樂應廣普善哉意義妙要離諸恐懼無有瞋恚行應時勝棄穢謹順善將養樂救衆群生聖慧無等侶心懷至踊躍捐除衆非處以消五恐畏緣是致道地至死不保命遠于諸惡趣以捨衆會畏終無恐懼心何因至今無則無有吾我若能離恐懼專精行慈愍至信修恭敬除慕富功勳夙興而夜寐修習衆德本以立誠信法不為欲所污心若聞雅典修善無厭極永除愛欲利常好樂佛道志慕淨慧力修治佛經法求諸度無極棄捐諛諂業言行常相應終無虛妄言最勝種無穢疾學至佛道以離方俗事不樂世諸利不違清白法勤修最上行精勤功勳義唯好如此法導御以自誓所欲見最勝為諸奉持法所至無嫉妬將順以弘誓身行常殊妙嚴淨諸佛土開化衆群生是遍諸佛土與諸佛俱遊佛以一名稱彼此無虛妄一切皆可得覺了最上義如是願無量導利至永安是廣普無限逮致無可畏衆生猶虛空諸法所因生最勝究竟俗興顯于慧地其心之境界極入於聖慧逮致三達智以開于衆生究竟至弘誓令我獲此願如是之暢達其行亦若茲如是善藏恩仁和心柔軟篤信佛功德觀察衆生元緣行入愍哀興發於大慈吾當護養育欲安立黎庶以是故布施若干種可惠國土城邑聚衆寶及象馬頭目及手足并以己身肉一切普能施不可懷怯弱志慕衆經典不以為患厭曉了世經籍隨俗而勸化其智超三世懷慚志堅強供養無等雙奉敬諸長者衆聖行如是夙夜勤不廢熾盛諸功德猶火中之金彼勤精行此菩薩十住地慕于無為業而化諸有為猶如有導師愍傷大衆賈豫問安隱路故在前指示菩薩亦如是初發第一住稍進至十住成致無礙道以能住此義究暢執功勳慈心不懷害以法而教衆在天下知時開化咸將護立衆令布施使樂佛聖慧至聖發意頃棄國捐王舍入于佛法教出行修精進尋逮得三昧見佛無數千感動諸佛國覩光往聽經淨化無數衆使入道法門遊於百千劫隨時現其身諸最勝本業覺寤衆睡眠如過去諸佛覺寤衆懵懵是為第一住最勝所宣布普愍傷世間無上諸菩薩諸菩薩等咸有聞此無上道業慕樂尊行心抱悅豫欣然安隱自從坐起迎逆稽首踊在虛空散衆天華口宣妙言歎曰善哉金剛藏聖猛無所畏曉了道住行菩薩法衆會悅豫聞解脫元唯咨上道第二之住其行云何當所思奉大智唯宣聞者坦然進至無極開化衆生漸備一切智德經離垢住品第二金剛藏報諸佛子是菩薩大士以了初發第一住竟爾乃好樂第二住矣意性懷篤奉修十事何謂為十一曰志性柔和而無麁獷二曰修正真業無有邪思三曰其行質直永無諛諂四曰心懷調仁不為瞋恨五曰其行寂然未曾憒亂六曰意抱至真不為虛僞七曰其行方幅無有雜碎八曰進止坦然無所貪慕九曰行在微妙不為下劣十曰其意寬弘未曾迫迮是為十事菩薩意性懷篤具成初住至第二住金剛藏曰又諸佛子菩薩已住第二離垢之地離于殺生不執刀杖心懷慚愧愍哀群生常抱慈心欲濟衆生無有思想心不念殺不求人便不危他身捨身之安而解衆患無有二心況復犯乎又不盜竊心常好施不貪他財己財止足不數多求覩他所有萬物生業財寶之利不生嫉心衆人迎逆莫不戴敬草葉毛米未曾默取念廣布施救濟諸乏割身所供惠衆窮困蜎飛蠕動蚑行喘息隨其水陸皆欲令安不遇衆患又捨愛欲邪淫之行不欲重習自於妻室而知止足未曾興心慕樂他妻心不思想不干他室奉清白行不為穢濁如母如姊如妹如女無異清淨鮮明而無沾污無有二心況犯色耶又不妄語不樂虛言所宣至誠言辭真正所傳順理言不失時不竊妄語至於夢中不演非法況晝日乎不為色教況心念耶常說正法佛之經典不出俗辭無益之業又離兩舌不傳彼此鬪亂於人不誤兩盲未徹視者使諍不和不侵犯人彼間惡言不傳至此此間惡言不宣到彼和解諍訟使無怨望修德為法令無罪殃講論經道各有篇章又不罵詈不演麁辭不宣惡言不傷人心世人所說口演不仁惱於他人不微中人無所恐畏常行仁和不興瞋恨害心向人不使衆人意懷湯火愁戚之患口所布言可一切心柔軟慈和聞者安隱心中愛樂喜欲見之多所悅豫遠近思覩乃傳此言久思其言無厭其辭又不綺語離于飾辭言無所犯未曾傳語常護身口終不戲言而取誤教況復由利有獲財寶貢上歸遺而宣虛乎雖身溺死不演非義身口相應言行相副不失神明不違佛教又不嫉妬不抱貪餐未曾興心慕求衆欲他人財業高德貴性不發癡心貪利無義見人多有豪貴至尊不以為嫉心存道義猶魚依水不捨正真又無瞋恨心常懷慈愍哀之心調和之心安隱之心柔軟之心其心常念欲濟一切而將護之假使其心發瞋恚者若有患厭不能自制衆垢危害心中惱熱尋除其根令不熾盛抱以仁和慈心弘坦如畏蚖蛇毒獸之聚惡心便休成斯仁和又棄邪見奉于正見不墮外學捨于貪事虛僞之術吉良之日不擇時節不思國位若覩帝主不以為貴不懷諛諂表裏相應心性仁和奉佛法衆不失三寶愍哀三界皆欲度脫是為十善常當守護此十善德心行如是思惟奉行若見衆生犯諸惡業當歸惡趣以十善事而開化之又其學士已立正見奉行至真亦勸衆人入于至真所以者何其自己身不能修德欲化他人立道德者未之有也彼選擇念奉行十善不歸三惡地獄餓鬼畜生之處其十善行得生人間及生天上三十三天又能奉行此十善者成大智慧思惟其義畏于三界興發大哀不為毀損從他人聞所宣音聲得成聲聞自然中間修清淨志不欲仰人不從他受自欲意解求成正覺好立大哀不以損耗志入深要思十二因不了無根得緣覺業其心寬弘最極無上不可限量愍傷衆生執權方便堅立弘誓無極法鎧坦然無迹欲救一切衆生之類不捨三界得成佛慧無礙道原菩薩所行清淨道地成無窮業習轉最上衆宜究竟至逮十力乃致佛法十八不共吾等聞之故當志學一切學已勤修精進彼益深觀其此十惡不善章句甚為招致地獄緣報中殃畜生微釁餓鬼是故我等若殺生者歸於地獄畜生餓鬼設生人間有二惡報何謂為二所生之處其壽常短又多疾痛而中夭逝家室憂戚莫不感哀若喜竊取亦歸三惡苦若生人間亦有二報何謂為二乏少財業怨賊劫取亡無多少令人憂惱犯他人妻室亦歸三惡復有二報眷屬不貞數共鬪諍喜妄語者歸於三苦有二惡報何謂為二人多誹謗言不見用其兩舌者亦歸三苦復有二報眷屬離散生下賤子共為伴黨其惡口者亦歸三苦復有二報何謂為二聞不可聲罵詈之音其綺語者亦歸三苦復有二報何謂為二熱惱他人所在至湊不能自決其貪餐者亦歸三苦復有二報少於産業又多疾病其懷嫉妬亦歸三苦復有二報何謂為二若在人間墮于邪見不知止足起于瞋恚亦歸三苦復有二報何謂為二自危己身而惱他人其邪見者亦歸三苦若生人間復有二報何謂為二沒在邪見六十二非喜行諛諂如是多患因致苦陰由以合成不善根本假使能棄此十惡者能以道法自樂伏意以棄十惡建立十善亦能勸他令住十善彼加大仁愍哀衆生心懷弘坦慈心愍心調和之心廣布恩心散擁護心是我之心奉師之心敬如世尊心自念曰一切衆生邪見所縛心意顛倒志念反逆發起虛行吾當盡立令住真實修於正真言行相應而安立之衆生一切破壞諍訟轉相誹謗常抱瞋恚轉相投禍吾等當設無上大哀無極之慈立堅固行令無彼此衆生不厭結縛之難嫉他人業造反邪行不順道本吾等令淨身亦淨口心衆生心迷建立罪福習淫怒癡為三蓋礙墮在塵網常自投己不便之地當求堅固善權方便消寂一切衆勞之患令立無難衆生在于愚癡之厄無明所縛住在六冥遠於大智遊暗昧門行窈弊業吾等當為開化嚴治無所罣礙清淨慧眼使一切法輒如所言由得自在不戴仰人衆生墮在生死困患地獄畜生餓鬼苦門漂在邪見六十二疑羅網所縵愚癡所蔽邪徑所迷遊盲啞路不親聖師無有救護有所歸趣無解脫業為賊所劫魔鬼在心遠離佛心吾當將養度生死原曠野懸路立之無難前在無畏一切智城衆生墮在大林盛火欲處色處無色之處浮泅三淵為生死流所見漂沒隨恩愛江大患所攝強在愚癡心念貪淫志思危害欲行賊役而計有身猶海水岸淫鬼所迷隨放逸走慕入嗜欲住己自大各懷異心未度想度或諸衰入而為震動遠衆德本吾等當化修大德本道力拔救令在滅度使離恐懼衆危之厄因建立之於一切智衆生悉為貪樂所縛無數苦痛愁戚之惱多所志慕憎愛所結合會別離而相戀嫪無明所蔽受在三界吾等當開示其正路至無罣礙脫三界難令立滅度無為之道衆生悉為猗見吾我五陰諸入不可轉移處四顛倒依六衰舍為諸惡賊所見攻擊遭無量苦吾等當化除諸患厄一切陰蓋使至無為衆生志存下劣之業乏於尊慧一切智心無天人道志在恐畏生死之難樂聲聞緣覺吾等當化使立微妙廣大之心是為佛子菩薩所入如此戒力勸化貧匱常抱慈愍以權方便立於菩薩離垢道地因得覩見無央數億百千姟佛供養衣被飲食床臥具病瘦醫藥一切施安身命自歸如來至真平等正覺受是至清十善奉行雖受行之無所違失於無央數億百千姟兆載劫中所受身形亦若干劫不懷貪嫉犯戒垢濁無益之業好喜布施奉持淨戒猶如有人適生墮地端正姝好尋而洗之清淨無垢菩薩如是在此開士離垢之地於無央數億百千姟兆載劫中所受身形不懷貪嫉犯戒垢濁無益之業行於四恩惠施仁愛利人等利救濟合聚衆生拔衆危厄十度無極勤修精進戒度無極悉為具足不使乏少又族姓子菩薩已能奉此初第一住有第二住名曰離垢菩薩住是為轉輪王治以正法然有七寶假使衆生退在犯戒十惡之業以權方便而勸立之令行十善若興福施惠施於人仁愛之德有所饒益等利之義一切不捨常心念佛惟慕正法志在徒黨菩薩之業開士之行六度無極十住之源思念十力四無所畏十八不共諸佛之法衆行普備念一切智以何方便勸化衆生令逮至尊為最為上為勝為超至於無上為衆導師勸化一切養育將護至一切智發意之頃捐棄家業愛欲黑冥順如來教出為沙門普行精進須臾逮致百千三昧見無量佛適見諸佛建立道誼動百千國願生其國越無限界嚴治清淨無數世界開化度脫無量衆生入不可限識本宿命所歷劫數選擇志求不可稱載道法諸門覩見十方衆生形像觀無限量諸菩薩會從學志願攝取菩薩殊特弘誓億百千垓兆載劫數莫能稱焉時金剛藏菩薩大士演此住已尋則頌曰此等心質朴修治己意性其志已真實柔順而調和已捨諸習貪慕求最上道其行極弘大輒在第二業執德住於斯積纍衆德本遠離於殺生心未曾懷害離於慳嫉行不犯他妻室至誠不兩舌不惡口綺語已消恚貪行常修大慈愍入于正見業無諂行質朴無愛捨自大作性粗舉要將護世尊教常行無放逸地獄之苦痛畜生亦如是佛教興光曜常以消餓鬼棄捨一切惡不善之心意滅除衆為害志大至誠法自謹敕其意所生轉善處至三十三天寂然永安隱猶如緣覺乘聲聞及正覺皆由此十事從清白句生見此常當觀恆修無放逸意堅立禁戒亦復勸化人益加增愍哀志性日弘慈觀苦惱衆生興發心傷念皆墮諸邪見斯由意不寤瞋恚懷毒害心喜抱鬪諍常不厭眷屬勤約慕境界吾當度脫之令濟此三厄造立大暗冥其性樂愚癡墮在奸惡路遊於諸見網周旋在生死當行方便度濟脫諸六情立正解五陰消除衆塵勞越于四使瀆滅盡三界苦然熾之惱患永離諸貪身世力吾我想吾以此等故苦行欲度脫遊心尊最勝無上佛之慧導御修至誠棄捐劣愵心立志於寬弘諸如來道慧勤精進無量堅固得佛道住此寂功勳積纍衆德本見無數諸佛咸悉供養之斯等解清白見億百千劫其身無罣礙心口亦如是諸佛子住此應時轉法輪開化立衆生使行十善業一切所積纍清淨之行本齊護於衆生斯富十種力因時發意項棄國捐財業佛所作沙門修入勇猛行已通大精進致尊三昧定見無數諸佛應時如佛界以是若干變及與不可計輒覩其境界各在斯道住已能住此願致最微妙慧造若干變化開化於衆生是為第二住大聖之所宣普愍世群黎衆菩薩最上已得聞是最始上法菩薩第二境不可思議至真無異諸佛子等喜而修恭敬住於虛空則雨天華各宣善哉德如山王而分布說禁戒之源心念愍哀一切群黎唯演尊妙第三行本所說至誠永無有異衆菩薩行最為無上普欲令世一切安隱以願稱講第一雅妙益當供順天人所敬第二離垢菩薩尊住除其愛欲精進造立建大法慧如之所為行布施事惠施禁戒成為大聖忍辱精進一心寂然善修智慧慈心殊勝愍哀行道衆祐宣布清淨之行譬如月明金剛藏踊演第三住心樂善說莫不欣然咸發道意
