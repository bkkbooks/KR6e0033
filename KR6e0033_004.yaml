body:
  text: 西晉月支三藏竺法護譯玄妙住品第七金剛藏曰惟佛子菩薩大士以能淨治第六道地具足安住入第七地行善權智則有十事修玄妙道何謂為十謂行空事無相無願所遵真諦成就忍力愍傷慈哀念于衆生奉行佛法樂供如來篤信無違心抱慧門常順空義積纍功德無窮之福解三界虛在於三世勸化群黎永以消穢所由恬怕除一切塵熾然之炎欲消衆生一切貪淫瞋恚愚癡曉諸所有如幻如化如夢影響野馬水中之月而無有二罪福之事終不腐朽意念國土猶如虛空開導衆生莊嚴國土法身清淨壞來至義得入一切諸佛名號具悉色身諸相種好而自莊嚴行無所著離於音響信如來聲本寂清淨解群黎音導利莊嚴一時之間覺了三世入於諸佛世尊之業又能普入若干時劫分別諸數剖判衆生志性所行是為十事修殊特道從六道地至於十住名曰玄妙是菩薩大士當勤修學善權方便智度無極因便得入第七道地住第七地勸化無數衆生之類以用諸佛無限之法教授無量衆生之惱入不可計諸佛世界嚴淨無數諸佛國土入不可議若干品藏經典之教入不可計諸佛正覺聖慧道業下入無量不可計劫入不可計諸佛所行去來今世勸不可計衆生之類令入篤信殊特之行入不可計諸佛色身現若干形解不可計衆生根性入不可計諸佛所宣音聲言教可悅一切入不可計衆生所思若干心行入不可計諸佛大聖導利慧堂入不可計諸佛應時化利聲聞所歸篤信樂不可計諸佛所宣好入導教尊習開化不可計數緣覺之衆使得成就入不可計諸佛至聖深要之慧所演道門入不可計諸菩薩衆開士之行班宣諸佛不可稱計大乘之業所布導慧斯等自謂是不可計乃逮佛名諸平等覺玄妙之地所行殊特不可稱限乃至若干無央數劫億百千姟乃能積纍如是佛法自謂我等建立此道不貪財業無想不想具足衆行如斯諦觀緣神通慧常行精進入於道行善權智慧善住聖道所行無動一時間靜奉行道教未曾懈廢自恣所欲其行如是巍巍之業坐起經行臥寐言談默然無蓋常立威儀不忘一切不離若斯念道之行彼發意頃心一念間備積菩薩十度無極普纍功勳所以者何菩薩大士奉修如是所在發心興無極哀以為元首合聚佛法勸如來慧以是德本施於衆生習於佛道是施度無極燒滅衆塵是戒度無極若能愍慈無盡之慧知衆生無是忍度無極若能勤行衆德之本習念救濟一切衆生行是方便是為進度無極其不捨道向一切智是禪度無極若了本淨自然之行無所生門逮得法忍是智度無極若能導利無量聖慧益於十方是權方便所度無極若能修行極上妙智宣于道業是為誓願而度無極降除一切諸外異學伏魔兵衆是為勢力而度無極審如至誠越一切法發悲義行是為慧度無極以是具足斯十度無極輒能宣備四恩之業具悉三十七道品之法至三脫門常平等心一念之頃漸備普備成立如是有一菩薩名曰解脫月致究暢時問金剛藏大士菩薩之行以何等業一切具足第七道地欲悉能備成菩薩道必當學進至十住乎答曰佛子一切菩薩菩薩行道皆當具足十住道地因是濟脫何況於斯七住菩薩所以者何又是佛子菩薩道地行以具足入神通慧普能具足一切道品亦復成就一切十住具足十住勉力解脫從一發意備斯七住所以者何是為佛子菩薩道住具足諸行備慧神通又有佛子從初發意始第一住一切誓願漸以親近具足道品心好第二次至第三弘要之業逮法光曜第四道地順從之業第五光明隨俗之行入於第六深妙之法勸立一切諸佛之法所以者何若有菩薩成就七住入神通慧輒在八住具足究暢無家業地猶如佛子有二世界一者瑕疵二者清淨本際平坦一等清淨所度一等其兩界間不可越度以大神通至力願力乃可越矣如是佛子菩薩當以至勤清淨開士之行乃能究暢不以輕懈唯以弘誓善權智慧神通之力乃能普備又問云何在第七住寧復親慕塵勞行乎諸菩薩業當以何察答曰佛子從始發意住菩薩地乃至十住咸悉消除一切塵勞禍福之業勸助道元當作是觀猶如佛子別知同道義無所越度故名曰七猶如佛子轉輪聖王乘大寶象遊四天下曉了是非與諸貧窮苦惱之患塵勞雜居解衆雜垢不為瑕穢所見污染亦無所犯成人威德捨人間性生于梵天升梵天宮覩見千界住在梵天顯現光耀不入人間如是佛子從初發意在菩薩住乘度無極皆知一切衆生之行不為塵穢之所污染升奉道堂亦無所犯乃名曰七假使能棄一切諸行因從第七至第八住亦承清淨菩薩之乘悉了一切衆生之行不著塵勞瑕穢不染永無所犯輒得超度入玄妙法是故佛子菩薩若逮此第七住若在淫種越一切欲住在彼欲行清淨法不當謂之有塵無塵雖習在欲則無塵勞願如來慧未具所願不當謂之離塵勞也住此地已志性清淨身行清白究竟鮮潔口所言辭心所念行本末清淨其心一切所可念事皆度衆生咨嗟誹謗如來至真有形無形諸平等覺所可言教皆悉順從未曾違之無復慕樂世俗所有工匠異術猶如第五住菩薩道不好世間普為師友多所悅可一切所好至未曾有樂至真法住于三千大千世界如來至真等正覺及第八住菩薩道行無等侶志性所行常懷仁和其意所乘以恆進定及與神通三脫之門皆修專精奉行道門無所希望尚未成就第八菩薩道地住斯地已一切發意遵承權慧咸以具足遂修道品以得菩薩普具足業七住道地逮成開士善擇三昧正受次名善念義定意勝定分別義定審宣法定善住本定慧通門定修法誡定若干義藏定生死無為定門菩薩逮此三昧正受如是備悉百萬定意道地清淨因其正受以斯定意逮淨權慧又入大哀無窮之力過聲聞地越緣覺地近行慧門以住此定持順無量身行之業進誦瑞應口言心念亦不可限見諦清淨光明巍巍無所從生法忍又問其初發意得第一住其身口意不普越度聲聞緣覺乎答曰以故勤修弘廣之心行至七住乃能逮成自在己行而無等侶猶如有人生於王家乃為王子有殊異德為諸群臣所見奉敬不以自己而放恣行假使長大承己身力超諸臣下所論國位菩薩如是這初發意過諸聲聞緣覺之地心性柔和寬弘無極是為菩薩七住之地己慧自在入七住菩薩甚為深也亦寂然也至無行也身口心也逮得道業不復重進更求義也何所望捨不望不捨乃為大道也又問佛子何謂菩薩所住道地也乃至菩薩寂滅成就正真之行答曰已逮六住能行斯法乃致菩薩七住道地一時發心心數數念輒致寂滅成就正行不當謂之證於滅盡以是之故身口心行不可思議從其所作此之謂也若有菩薩遊于本際而不取證猶如佛子時彼丈夫乘大舟船入於大海將船之師工有方便知水之宜既行大海不遭水難如是佛子菩薩立行逮第七住乘度無極道法之船遊行本際而不取證以逮如是聖慧勢力承三昧力成就諸行解覺道意以大善權智慧之力現生死門遊輒滅度心性自然已現其身與眷屬俱往來圍繞在憒閙中而常專精逮致寂定本願之故生在三界不為世俗之所污染出入進退寂寞惔怕善權光明靡所不耀無所燋然逮致佛慧退捨聲聞緣覺之地獲佛藏界現在魔界已過四魔遊在其部行度魔事現在異學一切諸邪九十六種六十二見開化外異令捨邪學不違佛道現在一切世間俗業以等導利度世之法示在一切天龍鬼神揵沓和阿須倫迦留羅真陀羅摩睺勒人與非人釋梵四天王隨其習俗莊嚴居服清淨好妙其心不捨法樂之娛斯慧如是具足究暢菩薩道地住於深遠難逮巍巍玄逈之法如是供養無量不可計數百千億垓諸佛大聖貢上衣食床臥之具病瘦醫藥所用為安歸命稽首斯等如來奉受諸佛之道化過衆聲聞緣覺法獨步無侶所問以時又彼菩薩用攝衆生法忍清淨遂轉顯耀其善德本無央數億百千姟劫乃復益茂清淨赫盛猶如佛子而有琦珍於衆寶中光獨明照巍巍無侶如是佛子菩薩住斯妙法難逮開士道業以是德本逮成善權智度無極遂更名顯成無上道聲聞緣覺所不能逮猶如佛子日之弘光月之臺宮光明所照普遍天下皆使豐熟亦能乾燥污泥之地日月之光亦無蔽礙莫不能通利如是佛子菩薩住斯玄妙難逮開士道業其功德本無能逮者德轉巍巍皆化一切聲聞緣覺令懷羞恥除衆塵勞使性清淨是為佛子菩薩大士玄妙難逮第七道住菩薩大士若成七住益得自在若為天王以隨時慧諸所興立行精進業若行布施愛敬仁慈有所勸利等惠利義心常念佛未曾忘捨乃至普慧一智慜智心初不念何時不逮成佛最正覺處衆生中而最聖尊導利衆生示一切智發心之頃如是比像精進超絶一時須臾逮致百千億兆姟三昧正受覩諸菩薩億百千姟眷屬圍繞以斯誓力承於菩薩所顯殊特因顯神變莫能稱計以若干億百千姟劫所修德義不可限量時金剛藏説是法已重欲散義即説偈曰玄妙之聖慧順第一句義心了第六住謹順己身行勤修於道教應善權智慧輒善逮入尊第七之道地遵空無相願志行慈愍哀若奉行供養諸佛之道法曉知衆聖慧於德力無厭由是行之故入第七道地而在於三界大亂中寂靜消滅諸群黎寂凝塵勞炎如影照幻化在夢因行法以入第七住顯示愍傷業嚴淨佛土空世性無有想備悉最勝相捨於動搖法以致妙音響除衆生瑕穢思惟慧本空最勝等導利以修行此法逮致斯顯明通在殊勝地為衆生所樂已住於是地衆生行無量選觀安住法數察不可限若干無數國衆念想各異志性懷篤信心行若干品宣布三乘教導利等無量吾等皆當進誦讀化斯黨如是等慧心逮致殊妙道威儀有四事遵善權智慧心念一切頃逮獲道功勳則能具足此十度無極業若以發意念是施勸衆生戒滅衆塵勞忍無所思念精進勤遵修轉上增行業道不可動搖慧功德立意無所從生忍離垢慧聖尊願勸助善權永無復狐疑周旋有勢力以聖明普濟道功勳如是一切隨時授先行如是著名顯以具足拔去心之垢斷絶鬪訟源等四等奉道造立第五業無起不分別乃長成第六是逮第七住彼成時功勳能遵若干行誓願不可計用何等之故受此聖慧業因逮第八住一切悉清淨玄微行難逮慧無無央數猶入第二國超越於中間修行七住法無著如錠燎若住於道義勇猛越一切得入第八住前乃聖慧地以越心念境住在慧之業在梵天常觀不倚世民間賢聖行如是無著猶蓮華住是若干品越度衆塵勞此無塵勞行亦無所盡滅如是至道住無塵勞穢行最勝幻無本以慧消滅瑕於世若干品工匠所修業明達是一切化住世尊教一心為神通咨受奉行力遵御若干品增進三品定超越諸聲聞緣覺行如是其住第七業修菩薩之行住本心性行致此真慧明成就諸聖子猶長養道力遂增精勤行得入深微妙心歸趣滅盡亦不造取證猶如入大海而住舟船前觀見一切水不增亦不減若能勤受行殊勝權智慧一切衆生類不能限德藏供養億載佛益更淨道業猶若干瓔珞無央數珍寶賢明住此行殊勝智慧光消竭愛欲源亦如月盛耀已入住此地自在為聖王造修最道義宣布慧果實而發意之頃強治精進力見佛諸佛千億百之姟數善修順己身普見諸十方加增在至願功勳尊無限普世難可了自由行道緣是為第七住嚴淨善權慧諸菩薩衆位尊神妙巍巍無量天龍無數人民聞其所説莫不歡喜供養安住華香幢幡雜成搗香珍寶衣服佇立衆蓋不可稱載雨諸瓔珞諸天在上宣揚妙聲柔軟之音自然演暢美柔和聲以奉衆祐及諸佛子咨嗟能仁世尊無量皆見至聖人中之上覩佛境界愍傷衆生其音若雨布大雷響伎樂簫成演若干聲諸佛無限億百千姟帝王國土亦如恆沙供養諸佛剎土無侶最為豪富威力能化入一毛孔諸佛班宣離垢無窮之法如演一毛豈復難乎國土處所及四方域若干種品泉源大海億載鐵圍及須彌山皆自然現無所逼迮悉入毛孔在中自恣地獄餓鬼及與畜生諸天人民鬼神衆魅阿須倫罪福各異俱來會在諸佛境界遊一切國在諸郡縣自然成現尊妙法輪講説柔軟安住音響衆生心念如所修行群黎若干其身各異衆祐國土群黎有身所在成體生天人間各各別異一切如佛所宣法教消除微想衆垢之穢興懷道念廣大佛土諸佛神足如是變異一切世人稱不能暢諸佛如是道慧無窮磬暢柔和微妙之音時來衆會寂然歡喜咸共觀敬最殊特聖以智衆會寂寞靜思猶如月蝕其光還復唯復欲聞第八住也願時演之行者所入漸備經不動住品第八金剛藏曰唯聽佛子菩薩大士若能暢成第七住以慕諦志求清淨之業善權智慧謹順衆行樂在所施無極弘誓依承如來所建立旨蒙宿德本逮得勢力如來十力四無所畏思念正覺十八不共諸佛之法志性仁和念其清淨功德聖慧威勢轉上興大悲哀愍衆生界不捨法樂通入無量一切諸法至無所生而無有相不有合成不失慧明無所究暢亦無所滅然無所有等入元本轉上得度普除一切心念識想等攝志性本淨惶慌因是超越應時逮得無所從生法忍此之謂也菩薩以逮如是法忍這得是住菩薩地不可傾動獲致菩薩深要之行難知玄妙無能壞者消一切想皆攝衆念而究竟矣無量無侶一切聲聞緣覺之衆永不能逮其寂寞事以淳淑矣自然現哉猶如佛子神足比丘所念自在稍漸進前乃至寂滅三昧正受悉除一切所欲妄想菩薩如是適逮此住捨衆俗業致無業財至真之法離身口意之所習樂住於寂寞猶如佛子假使在夢逮大功德即自知之因在於彼大精進力普以越度逮則解覺彼修方便夙夜思念以除好樂如是佛子菩薩大士無極精進適逮此已住菩薩地如是不動遠一切業稍習諸宜於行無二又等修行無所親近猶如佛子若生梵天住于梵宮不著欲行亦無塵勞菩薩如是住此道地其心普遊諸所習行雖在是行不以是行有所染污彼意曉了所在作行菩薩之行在泥洹行不以為行何況俗行菩薩大士以入是地本願力故至如來覺無極大聖是法典門道如來法造立聖慧如是辭曰善哉善哉族姓子是諸正士第一法忍歸於佛法又族姓子佛十種力四無所畏佛法尊位仁則未有以是勤行慕求精進慎莫違失是道忍門為衆生故而尊修行又族姓子仁寧逮此若斯寂行而愚凡夫失不寂靜習在無數塵勞之行為若干想之所危害又族姓子衆生設憶念本宿願哀念在冥故為求道奉行靜寞不可思議聖慧道門終不懈廢又族姓子是諸法本從法發來興成如來以立如來住在法界如來至真不別行是一切聲聞及與緣覺不能逮至斯不相法又族姓子且觀我身不可稱限慧莫能論土不可量明不可量道場不可量音響清淨亦不可量以是之故仁慈所行因顯發業又族姓子所可定言光明之謂云一切法無所想念乃為光明諸族姓子法明若斯如來所行行無邊際眷屬無底斯等所入從發行來巍巍如是又族姓子仁且觀此十方無量諸佛國土衆生無限分別經典而不可計普入一切言行相應如是佛子佛天中天菩薩行是如斯比類不可限量導利道門用開化衆若有菩薩分別解説無量聖慧具足成就導衆之業諸佛子等吾囑纍汝假使諸佛化此菩薩入衆生中導利道門由是之故致于滅度衆生之事自然舒暢諸佛世尊勸化於斯諸菩薩法無量慧業乃令一時所導利衆因其聖業以為元首從初發意計七住竟合集方便由此功勳百倍千倍萬倍巨億萬倍終不與等無以為喻所以者何以是宿命一身導衆致導利業逮得此住誘進平等諸菩薩行分別身事行力成就宣暢布散無量音聲正法之教修慧無量導利無量所生之處嚴淨無量諸佛國土開化無量又衆生類供養遵奉無量諸佛發覺無量諸法道門神通之力不可限量剖判開化衆生厄難廣令無量衆會道場所可遊居亦不可量持身口意積纍菩薩一切要行亦不可量猶如佛子大舶舟船欲入大海安無放逸庠序進前致無量寶珍琦璝異適到大海望風舉帆其風和順一日之中超越大海一切財寶所得利入無央數藏皆為充滿用不可盡菩薩如是積成無極廣大德本合集大乘逮菩薩行道法慧海一時須臾致聖明財無極道寶入一切智前宿所積世俗財寶不可比之思惟計校百劫千劫萬劫無央數劫不以為喻又佛子菩薩若立第八道地遵大善權智度無極宣布勸化無財業義若菩薩解奉一切智遍知十方諸成佛土亦復分別壞散佛土若以覩知世界散壞若世合成用何因故世界散壞以何緣故世界合成悉能見知地種少地種多地種有限地種無量悉別知之水種火種風種亦復如是皆曉了知多少大小有限無限諸塵微妙分別所在諸塵限數隨時悉解若干世界有若干種無限衆塵微妙難了普悉知別若干品塵自然合成諸佛世界所有塵限悉能知之衆生之數國土形數其身長短大小悉能知之地獄處所𤢌獸餓鬼性行何因墮此皆知所行多少諸塵合數阿須倫行諸天所居世人所處悉能知之合會教化欲界合散色界無色界合散皆悉知之少多大小有限無限而悉知之遊居三界取捨之義開化衆生彼能成就曉了衆生諸身方便諸身形像所在之處悉曉明之所行生處諸佛所遊如衆生類所生安居身所積行隨其身行而建立之己身國土隨立己身其意無盡己身建立無身之身己身國身罪福之身乃須建立罪福報身建立己身無盡身意無身之身己身無盡衆生類身國土身緣報應身聲聞身緣覺身菩薩身如來聖慧身法身隨時建立顯此諸身悉解衆生罪福身報應身塵勞身色身無色身國土身多少大小穢濁清淨廣大無量減損平正導利平等講説報應皆悉知之罪福身行所當獲報合散成別亦復了之聲聞乘緣覺乘菩薩乘所行業合散所歸而悉知之如來聖體成最正覺所誓願身及滅度身所建立身色像相好所莊嚴身其行者身可意身自大身謙恪身功德身聖慧身報應身謹慎行業聖慧之身所歸度脫皆悉知之法身平等無身之身不可限量一切普入有身無身靡不分別一一暢解其身以逮如是行業致壽自在心得由己用度所為自恣無難所行無拘所生從己本願所致篤信之故神足之恩蒙聖慧行因法所將而逮致此以是菩薩十事自在適得自在成無量慧明不可思弘普之聖聖無有侶以入如是究竟永在無所生身轉所習行永無生故以轉諸行慧為元首習轉身行以慧為首轉口習行取要言之智度無極為大錠光大哀為首分別曉了善權方便不棄至願為諸如來威神所立不應休息其慧以應一切衆生遊於無際諸佛世界宣義散結佛子又省菩薩常修平等所逮道住不可動搖積纍一切諸佛法典身口意行轉增進業以獲此住其力志性則輒堅住皆以消除一切塵勞心懷仁和力勢堅強在於元首恣化群生大哀之力所可建立用衆生故無所望捨益加建立大慈之力將護一切衆生之類總持要力而得堅住不捨衆生其誓願力而諦得住一切佛法選擇分別善諦建立神通之力住無限世於諸行本擁護一切衆生之類堅住願力遵習一切菩薩道業而無所捨度無極力其行堅住合集一切諸佛經典正住如來所建立力成就正覺一切敏知以入此行如是力勢普現一切神變無窮輒往生於一切所趣金剛藏曰是為佛子諸菩薩業住於慧地而不可動是謂無侶亦復號曰不退轉地慧不回還則謂難當一切衆生所不能逮則童真地為無所生為所生地所願自在為滅具地無所造作究竟之地積纍真慧則無為地善修志願為建立地度無所作為無財業宿世所行衆苦消去邪以降伏如是佛子菩薩大士以入佛種承佛功勳威神遠照由歸如來威儀至業佛境界門常為如來之所建立得入釋梵四天王宮金剛力士常隨侍後逮致定力其身無限降伏色藏散無量結以皆永離諸身行力具威無極大神通力所行報應而得自在無限定意受莂無量自恣由己而無所礙如其淳淑覺度衆生所示現義以入是行得入道場無極大慧以行大慧神通之業常演大聖智慧光明施與章句無罣礙界分別世界十方國土所宣章句現一切業功勳之德發心自在而諦思惟解去來今回轉一切衆魔徑路下于聖慧遊入如來州郡境界無際國土所處講堂奉菩薩行其所誘進無能退轉以故名曰入無動地金剛藏曰是故佛子菩薩逮得無動轉地常在無際見諸如來不可稱限未曾違遠彼行究竟成三昧定威力所入見佛供養奉事歸命終不忘捨於一一劫中一一世界所見講堂各現諸佛咸各供養無央數億百千姟佛一切施安稽首歸命以禮如來曉了世界以為元首慕導道明啓受法教重復加增逮佛滅度行無等侶巍巍超絶與衆殊異咨受世界講問宣傳遵無央數億百千姟所積德本轉進顯耀猶如佛子此閻浮利上明月珠又其價直一閻浮提以用著頸為無等倫一切天下人民之衆所著瓔珞無能及者如是佛子菩薩住是不動轉地以此德本成其大明一切聲聞及緣覺衆所不能逮及於七住菩薩行業菩薩以入此道地者承無極慧消除衆生一切塵勞剖判聖慧微妙道門猶如佛子主于梵天所行慈心遍大千界其光普照菩薩大士亦復如是住此菩薩無動轉地照耀百千諸佛剎土滿中塵數光明悉周無量佛國照盡一切衆生塵勞稍漸滅除心之毒垢是為佛子菩薩住是不動轉行所宣平正菩薩功德第八道地弘普咨嗟諸劫無際不可究竟菩薩所住因為梵天大梵天王主千世界聲聞緣覺菩薩所行真正莫能逮者而度無極分別世界修無等倫聞所講説所興因緣方便之業布施敬愛利人等利一切救濟常思念佛未曾違捨衆行具足至一切智專惟大道以何修行為衆生尊一切殊特將順普聖覆護十方發意之頃遵如是像勤奉精進一時須臾逮具足成十千世界百千剎土滿中諸塵三昧正受及見十千百千三千世界滿中塵數諸菩薩等眷屬圍繞從是發願菩薩力勢所誓殊特靡不感動智慧明了不可稱計如是思之億百千姟不可限載行無量劫功勳無底無以為喻時金剛藏菩薩大士復欲重散分別此義即説頌曰漸備七住地智淨行善權諦將護導業結立無極願積功而纍德堅住人中上志樂于聖慧輒入第八住殖德大聖慧精進行慈愍其心無限量意念猶虛空聞法能曉了入大聖勢力忍力無所生寂寞順微妙所受無所起不生無有相不滅無所壞亦無所究暢處所為自然無本藏捨念已離心意性其思等如空斯忍以如是所行無放逸行深要感動逮致惔怕行衆生無能解由間居行業執持心所想曉了衆行念其意立若斯心無有思想如比丘消滅逮得無所著心之所想念猶夢所見覺若梵天具足欲界亦如是安住本立願數數而勸衆是為第一忍得致阿惟顏我等慧玄逈勢力意解法彼則無我所精進勤修行所可奉寂寞消一切愛網滅于大然熾世俗塵勞火自識本宿願行愍哀衆生以慧利造立用度脫黎庶常能尊此法住本無無想佛解一切住越聲聞緣覺世間俗威勢無及此十力唯智無能限三世無罣礙無等倫如是天人所奉敬合集以導化行無數慧門成就最勝法入無量彼岸前世行佛道假使順隨時如是致賢明逮入殊聖地一時普周遍至于十方界以致慧所歸逮得諸神通猶如大海水諸天華神器心貪以永除得立慧道業選擇諸剎土住在曉分別四種之境界離若干貪利微細及麁獷等入識解義一切三千界滿中衆塵數分別衆生本四大所生身計數諸慕樂六趣限如是解散慧境界不可稱限量慧剖判心意至于一切心彼修己身行故將導衆生一切三千界周普若干色徹見衆品形然在無限世猶如日周行在上虛空行已斯殿舍進光明普照耀御以本無慧在法界不動黎庶性清淨道明所遍照如衆生本性其身各所在顯現一切衆照化天世間己身得自在勝降無性行示現安住身莊嚴諸相好衆生土如是從罪福受身若干種聖性成法之慧體虛無為身界受以平等業現神足諸變消黎庶衆穢十力廣自在因慧廣無極造聖逮慧明興發愍順哀一切最勝教以法生道業謹慎護三事無動如須彌諸衆祐號力柔士勢無恚是士無回轉衆魔莫能當佛之所建立釋梵咸奉敬其金剛力士以力勢常侍於是土地處合德不可量億百千劫中不能盡其限稽首歸諸佛其億數那術成就最上道猶嚴王者服極是道地處菩薩斯集會得為大梵天若干界功德宣布三乘業逮得無限侶慈心為清淨光明慧消塵一時發心頃至百千佛土逮諸定意元如滿剎土塵勇猛覩處所十方化衆生所願亦如是莊嚴尊無限此説取要言第八勝自在具足億千劫皆不能盡極説此第八住時應時震動百億佛土佛之威神之所建立不可思議功德巍巍不可限量演妙光明普現一切諸身形類照諸國土安諸衆生無央數千諸菩薩衆住於虛空所供養具超天上物所貢上佛玄絶殊特大神妙天與其眷屬自在天人亦咸悅豫以若干品而供養尊奉事德海諸天玉女無數億千歡喜踊躍諸根和悅以妙伎樂鼓天倡樂供養大聖斯諸伎樂樂大神聖出如是輩百千音聲其響柔和寂寞惔怕消諸患厭離衆穢垢捨于土地所行至真而有卓然用衆生故遊到十方大通所顯現最上行志若虛空心亦如之天中之尊人中為上覺了最明玄妙境界無底功勳十方嚴淨奉事道門衆祐諸子以道顯示不可限量佛之功勳遵行聖慧不慕徑迹於一剎土而不動移皆周諸國無有塵垢遍趣愍傷衆生之類為之元首滅一切嚮無所想念所言暢音辭百千種若有聞教不肖衆生心在下劣其意自歸彼若聞聲至聖所現隨其本行而開化之若有衆生諸根明達心好因緣無所志樂為現離垢慧明之義若有衆生心抱愍哀意懷慈仁佛在彼處勤示正行若有衆生志在上尊意樂斯法在彼顯示無量佛身因其化現猶如幻師所周旋處導無央數億千姟身佛子如是樂于慧幻現一切行離諸所有如是音聲其數百千班宣柔軟仁和之嚮天人玉女在世歸伏默然樂寂衆會欣豫歌頌安住功勳德稱巍巍無量不可講論説此菩薩第八道地奉行正法通至大乘漸備經善哉意住品第九金剛藏曰且聽佛子菩薩大士諸佛慧行無量如是轉復增加遊于寂寞志在脫門諸如來慧長益至德又以仁意所可修行如來祕密因可遊入斯大道慧不可思議選擇至要總持清淨三昧正受放捨衆非清淨之業導利一切成大神通弘廣殊遠分別世界教令黎庶隻行獨步十力無畏諸佛之法十八不共而無等倫嚴治道本如來至真轉于法輪歸趣境土建立大哀住於大願不捨十方入於菩薩第九道地住此地已有不決行善惡之心知如審諦供養經典奉事至真以及有漏無漏之法各順俗法度世之法修行所思不可思議遵承究竟不決了法順從聲聞緣覺之法奉行菩薩敬重斯道要誓隨時如來道地以時歸至有為之法親近志在無為之法知如審諦如是慧明覺了所歸如審解知衆生心行所可取捨塵勞之垢所受禍福攝取諸根所行篤信諸種歸趣心性衆結造行之處所生受處所居止處決了三聚業所至奏知如審諦察衆生心所行是非若干品心其心須臾而有進退若合若散其心無身心不可限一切普興心為顯耀其心若塵若無塵勞若有縛心及與解心亦如幻化曉了其心所歸住止因緣進退又其塵勞玄絶遠遊療治當來等類無業諸結因緣所遊居處心之合會在一處所若有別離有所生處周旋現在進止行來分別三界恩愛無明諸見病痛自大愚癡無極罪殃斷截滅除三藏之珍曉了審知入至計常八萬四千衆塵勞行未決罪福善不善義教告無明使亂心黨令無異業思惟衆祐以致報應積聚衆利所親造行不失果實所報無報黑冥清明無暗結白如是辭語所行緣報而有齊限罪福田地則無有量賢聖處世所行治事現在罪福當來所習方可更歷解乘所趣不了所趣曉解分別方便隨時常等識知八萬四千若干品罪知審所由所趣彼達諸根柔劣中間明了之本取要言之隨衆生本前世宿命毀壞之事不壞之業微妙中間下劣之行塵勞伴黨無有財業從本行心能以決了若不決了開化真厚諸根羅網分別退轉攝取衆想諸相豪劣周旋往來進退無回解暢三世遠遊無窮獨步無侶於若干品常以平等八萬四千若干種根悉能知之取要言之其篤信樂柔劣中間諸根明達常隨諸根八萬四千所懷篤信而悉暢了若干種品諸衆生行其界柔劣中間明達隨從諸根八萬四千諸種四大上中下心性行善惡解暢諸根之所歸趣彼心性行心意伴侶志造𬿆黨其心合會或有別離玄逈遠遊若有自大無有自大其意調順無有衆厭亦不懈廢皆承一心脫門三昧正受神通之宜而無合會縛著三界願至實心不習衆行習入道門無言教矣不倚伴黨無財業事無異無侶修治道門審諦知正衆生之行有若干品所生處行其行而住生地獄餓鬼畜生之中阿須倫諸天人民之所歸處色無色所生處想無想所生處悉了知之罪福報由恩愛情欲無明暗冥精神種類還復回生名色為侶用無道業生死愚騃親近恩好則致貪欲慕求情愛若不慕榮衆生所樂於三界趣意懷至實無所傷害悉審諦知志行所居所當行者如來歸趣繫習所在從衆生行各由罪福而習塵勞善惡未宣本末所作轉輪無際復轉回旋歸本所行未有遠遊難斷難斷欲拔淫塵貪嫉虛事不可卒清心明開達乃能超出於所作事至無所有悉審諦知於衆生行究決不決志在邪業馳趣反見愚惑之業在於正見定在正業除衆恐畏莫不究竟又有五逆中間之難悉以究暢五根達趣正真之行以捨恐畏及無究竟曉了邪滅及正寂滅并所犯事令趣寂業還無所歸而墮邪業回行退轉導示賢聖無上正道若不決了隨時散結將護業耶當所宣布悉當知諦是為佛子若歸此慧菩薩大士則得安立善哉意地菩薩之住已住此地皆能曉了一切衆生如是行業隨其積行應當解脫而開化之能明衆生應時教導知以勸誘聲聞緣覺化諸菩薩説如來地從其衆生而為説法導利度脫如其性行從本根元應當解脫而為説法因其所行更歷本末而為開化如所乘法修思脫門因其脫門班宣道法住此道地覩大法師之所興隆擁護如來無極法藏彼若往詣法師所咨入無量曉了聖慧奉行宣布四分別辨菩薩所行隨其説法彼常修行無所破壞菩薩大士四分別辨遊不退轉何謂為四一曰分別法二曰曉了義三曰順次第四曰解辨才彼所謂言分別法者明宣諸法自然之相曉了義者能解暢法之所歸趣順次第者説無所壞剖判諸法深遠之慧解辨才者無所結縛知法無斷分別辨法曉了法者謂法自然自然之身曉了義者知以照耀咸歸經典順次第者暢一切法當可講宣無能斷絶分別辨者如其道教無所希望演布無際解暢法者達現在法所宣歸趣曉了義者知去來法報應之理順次第者説解一切去來今法無所破壞分別辨者一一所説而無二心無有邊際振法光明解暢法音能識諸法剖判衆事曉了義者分別諸義靡不蒙慈順次第者從衆生音言辭遠近而為説法分別辨者觀察一切心性所行因為演經解暢法者曉知方便明散法慧不壞衆善曉了義者明通本無住無二慧而為黎元各各了之順次第者而講説業聖慧財富不可破壞分別辨者解暢衆理隨時之義曉了本末解暢法者知一切法其元為一失其本源隨流生死輪轉無際曉了義者則能越度五陰四大又十八種諸衰衆入方便解脫明十二因緣悉無端緒順次第者宣説一切衆生之元五趣周旋志性和雅音聲柔軟聞者普受分別辨者演要言教其明轉增而無邊際光明遠照去衆愚冥莫不蒙耀解暢法者導利一品無有若干菩薩大士興無極慈立無盡哀開發大乘曉了義者分別諸乘度衆齊限弘逈之行坦然無侶獨步衆會順次第者班宣一切所志諸乘上中下學無所破壞稍引誘進入于大道分別辨者而為一乘無有邊際宣布正法炎照三界苦惱之厄除去陰蓋逮致三昧解暢法者奉諸菩薩聖慧之業遵修法行道明超越巍巍無量曉了義者敷演十住所處本末開解學者各得其所不失志行得度世俗靡所不通順次第者宣布法禁各從慕求婉孌道教無所破壞分別辨者宣一切行而無邊際講説本業至成正真不在二乘聲聞緣覺解暢法者心自然達一切如來皆為一佛諸力無量覺了此義由是之故因轉法輪至一切智而有所度曉了義者又能知識若干種類制住正真須臾分別當所歸趣道俗是非靡不宣布順次第者如其正覺剖判言説觀其根本上中下行心之深淺而開化之分別辨者所班宣法一一章句演若干義慧無邊際不可斷絶飽滿飢虛解暢法者普請如來所布言誨一切十力及無所畏諸佛之法十八不共修于大哀而轉法輪暢達無窮一切敏慧曉了義者識知衆生八萬四千若干品行從其志性察彼根源隨如信樂宣如來音而為散結順次第者於一切行無所破壞為師子吼出如來音八部之聲聞于十方徹覩無表分別辨者暢如來慧威神光明消除衆冥暗昧盲塞自以己行道場之力隨其信樂而開化之各令得所金剛藏曰如是佛子第九菩薩立九住者其惠德本巍巍如是辨才若茲逮得如來無極道藏為大法師造立義器為義之君獲致義句玄妙總持攝救三界法主總持取要言之聖慧神通而用拔濟照明總持照于十方善意總持攝一切意如地總持行猶虛空威神難逮帝主總持之要無極法門所向總持所遊無量回轉總持周旋往來也逮若干種方便總持如是等類具足備悉逮十不可計百千總持音聲隨宜無所不達所分別門不可限量班宣經典莫能稱載如是總持不可限載正法道門聞不可計諸佛世尊現身演法聞之不忘所聽班宣不可講論在於一一如來之所咨受諷誦十不可計百千總持如一如來所可開化無有邊限如來至真無上之法亦復如是等無有異彼稽首頃轉復增加於無央數至真等正覺受道法門聲聞緣覺不能稱載所修博聞受音總持逮此總持者建立恩施以德總持於百千劫逮如是持獲致辨才而以建立如斯巍巍法與聖衆若合會時周滿一切三千大千世界隨衆生心所應當化而為説法處于法座而於法座承如來旨逮得十住阿惟顏地於餘一切自在自在尊無有侶致于光明靡所不耀處于法座須臾之間適發意頃則以一音演若干嚮普告衆會一時之間光從口出其諸毛孔宣一切音演布道化無所不解照于三千大千世界及與有色無色之界咸演法音爾時於彼大千世界所在衆生一時皆來難問義理各各講説質無數事不再重啓各得開解彼時菩薩一時須臾悉受衆嚮所宣諸音以一言教普告一切取要言之遍二三千大千世界三四五十二十五十乃至周百三千大千不可稱計大千世界光作法事建立如來威神聖旨常以應時為諸衆生興作佛事發起得立轉復增進如是聖慧受振光明而行精進假使一一從諸毛孔如無邊際諸佛世界滿中衆塵覩若干數不可限量諸佛國土及其衆會集在道場班宣經典一一如來與無央數衆生之類若干群黎而為散結一一衆生心性所懷不可稱載心各各異勸導利法因開化之如一如來之所度脫一切如來亦復如是等無有異猶一毛孔一切亦然悉演法音吾等於學亦當如之廣然其志思方等誼將導不逮一切如來一時之間普現其身悉受法明斯皆一音恣其所樂順所稱歎諸衆生會充滿道場欲聽法者具足備悉吾等於彼亦當復然智慧光明辨才通徹清淨之業一時須臾悅解衆生其身周旋若干世界所有衆生以逮此住菩薩道地夙夜轉進所念無異入佛道行逮得如來平等之教致于菩薩深妙脫門以入斯惠常見諸佛未曾違離一一劫中覩無央數億百千姟諸如來尊供養奉事問諸如來咨受所演執持經典而班宣之其功德本遂更滋茂超無等侶猶如佛子工師絶伎能成瓔珞治文飾好以用進上轉輪聖王尊玉女寶繫在頸著巍巍無比晃然煒煒暮處一切高臺樓上普照天下諸四方域衆生瓔珞掩蔽不現以獨顯耀如是佛子菩薩大士逮得行此善哉意開士道住其功德本轉更茂盛超無等倫過諸聲聞緣覺之乘越初發意七八住表其德本明消滅衆生諸塵勞心咸能照之從是得恩回惡就善捨俗入道猶如佛子大梵天光周於一切三千國土明無不至衆人蒙耀菩薩如是住此善哉開士道地一切德本光明之耀普照衆生聖明遠達以道法耀消衆冥塵咸令一切回俗就道是為佛子諸菩薩大士名曰善哉意第九道住平等之教玄曠之業宣講其德無央數劫不可究竟無能窮極菩薩大士以住此地若為梵天若大梵王居三千世界而得自在造立聲聞緣覺之法菩薩之行講度無極明無有侶咨問衆生志性本末所為道業布施惠人愛敬仁和利人饒益等勸財共以是四恩普濟一切以斯積德常感念佛心不違遠乃至備悉成一切智思念不忘云何逮致於諸衆生最尊無極至于普聖將導不逮發意之頃如是色像勤修精進須臾一時具足充備十無央數百千佛土滿中諸塵定意正受見諸菩薩亦如十不可計諸佛國土塵數大士眷屬集會以上妙願道力所致諸菩薩等所願殊特感動變化無能稱載至不可計億百千姟無限之劫皆不可議時金剛藏欲廣此義重散其意即説頌曰斯力不可量奉行佛要道微妙慧第一衆生難曉了如是處祕藏衆祐面執持為衆生之故得入第九住以是逮總持三昧無極尊廣普神通業又周遍國土決解聖慧力最勝現處所志願心愍哀正住入第九以通此道地上勝攝持藏真妙之法要不分別義德其在有漏行及世賢聖身斯心不可議尊覺了至義分別暢諸法所思惟究竟成就三乘事稱量計所作有為若無為體解所當行二事俱造有順世而隨入以入如是慧意微妙殊特攝受衆生心思求其本末心若干猶畫遠移而回轉其神識無限晃耀皆遍入諸塵勞之門伴侶難療治衆結受處所周旋親近患所作若干種入於剖判業等下無果報因緣以消滅有入明達根軟劣及中間壞除諸過去下通當來義篤信無央數清淨不清淨通周八萬行又邊四千事若入於諸種成騃邪見塵由是受馳騁無邊不可斷其心之結縛黨侶而俱遊斯心等思惟縛束無窮竟志性之徑路衆結猶覆月永無有處所亦不止宿居以故會難化人界不反源以金剛斷截其道而無異分部隨行入生在六趣處欲情為愛潤無明罪福田神識為下種造行為名色在於三界中所遊無邊際至于天坐處隨塵勞心行一切遍周遊故復還生死衆生處三品故使有往反諸邪見之火便種神識迹以至如斯行因住此道地從衆生心性諸根順應解為其説經法班宣分別事剖判斯義理善權真辨才若詣法師所輒以到所居言説無所著猶如須彌山雨為柔軟澤甘露普潤衆覺意之根力充滿猶如海曉了善義慧解法亦如是一切皆滅盡逮得至辨才獲明無央數一萬諸總持以執衆法要如雨於大海如是有總持逮清淨三昧一時見無數諸佛億百千以聞於法寶數數而班宣言辭暢清白自然妙音聲須臾發意頃知三千世界衆會一黎庶若干種所念可悅一切衆如其心諸根所入等亦如四方域大海其德復超此總要致精進思惟如恆沙實為不可限安住唯説法化凡夫衆生聞之尋受持猶下種于地假使諸衆生處在十方界普令此衆生悉會坐一處斯等性行念皆能周遍至則能一音聲普以充飽足人中尊住斯最上之法王轉進悉國土成就世尊子恆以夙夜寧得勝合志願住在深妙寂勇猛慧脫門奉事專供養禮諸佛億姟成如道巍巍莊嚴如輪轉光耀消塵勞所受演威明猶如梵天光照三千世界功勳住於斯持無極梵天佛分別説解造立於三乘有所勤修行愍哀於群黎以入一切智逮得聖慧德國土不可計乃至王舍城威勢一時思三昧遍十方覩見十方佛衆祐音柔軟興造微妙願其心無限際是為第九住深微妙難解安住已自演大乘之行業淨居諸天億載來會聞如是行無上正教住於虛空心懷踊躍恭敬謙下承事安住諸菩薩衆無量億姟處于虛無心中欣豫雨衆華香可悅無限炙然衆生塵勞之穢自在天王甚大歡然住於其上億千衆俱恭恪之心散諸妙衣梵天等寂然琦珍一心自歸諸玉女衆無數悅顏鼓諸伎樂億百千姟亦復作禮一切普演如是像音衆祐眷屬坐遍佛國其光明耀皆照諸剎諸身億載若干柔軟周遍法界靡不悉達如來至真一毛光耀其光晃然滅衆生塵尚可數盡剎土之塵此會人數不可稱計有時佛身微妙諸相而以咸覩諸轉輪王復遊他國所行最上甚好巍巍見天人聖諸大神尊處兜術天現下母胎復以出生雖在胎中現無數億國適生墮地現其佛土導師本願用衆生故而復出家得成佛道為最正覺轉于法輪現諸佛土無數億載猶如幻師善學術呪將順壽命現無數術世尊如是修學智慧用衆生故而復出家空無寂寞本淨無相諸法平等猶如虛空佛之教戒最利本無示現殊勝佛之遊居諸安住行皆為自然愍哀衆生逮成經典諸相之相見平等相一切諸法第一無相諸衆祐義聖慧所從悉棄衆相有想無想所行等解諸行速得成就衆人之上如是音響無數億千宣仁和聲在世降伏衆魔天女以知衆會至真寂寞如月盛猛照於天下又金剛藏演若干品時諸佛子修于大乘十事之業當可施行諸室宅行功勳之業見瑞應來心懷悅豫上人聖慧咸悉歌詠
